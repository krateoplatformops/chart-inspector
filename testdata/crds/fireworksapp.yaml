apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fireworksapps.composition.krateo.io
spec:
  conversion:
    strategy: None
  group: composition.krateo.io
  names:
    categories:
    - compositions
    - comps
    kind: FireworksApp
    listKind: FireworksAppList
    plural: fireworksapps
    singular: fireworksapp
  scope: Namespaced
  versions:
  - name: v1-1-9
    # This is now the default version returned by 'kubectl get' 
    # because it is the first entry in the versions array.
    served: true
    storage: false
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            properties:
              app:
                type: object
                properties:
                  service:
                    type: object
                    properties:
                      port:
                        default: 31180
                        type: integer
                      type:
                        default: NodePort
                        enum: [NodePort, LoadBalancer]
                        type: string
              argocd:
                type: object
                properties:
                  namespace:
                    default: krateo-system
                    type: string
                  application:
                    type: object
                    properties:
                      project:
                        default: default
                        type: string
                      destination:
                        type: object
                        properties:
                          namespace:
                            default: fireworks-app
                            type: string
                          server:
                            default: https://kubernetes.default.svc
                            type: string
              # Added git to v1-1-9 to ensure visibility/compatibility
              git:
                type: object
                required: [toRepo]
                properties:
                  toRepo:
                    type: object
                    required: [name]
                    properties:
                      name: { type: string }

  - name: v1-1-10
    # This remains the storage version (how data is written to etcd)
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          spec:
            type: object
            required: [git]
            properties:
              app:
                type: object
                properties:
                  service:
                    type: object
                    properties:
                      port:
                        default: 31180
                        maximum: 32767
                        minimum: 30000
                        type: integer
                      type:
                        default: NodePort
                        enum: [NodePort, LoadBalancer]
                        type: string
              argocd:
                type: object
                properties:
                  namespace:
                    default: krateo-system
                    type: string
                  application:
                    type: object
                    properties:
                      destination:
                        type: object
                        properties:
                          namespace:
                            default: fireworks-app
                            type: string
                          server:
                            default: https://kubernetes.default.svc
                            type: string
                      project:
                        default: default
                        type: string
                      source:
                        type: object
                        properties:
                          path:
                            default: chart/
                            type: string
                      syncPolicy:
                        type: object
                        properties:
                          automated:
                            type: object
                            properties:
                              prune:
                                default: true
                                type: boolean
                              selfHeal:
                                default: true
                                type: boolean
              git:
                type: object
                required: [toRepo]
                properties:
                  toRepo:
                    type: object
                    required: [name]
                    properties:
                      name: { type: string }
                      org:
                        default: krateoplatformops-archive
                        type: string
                      # Simplified for brevity; keep your full git logic here
          status:
            type: object
            properties:
              conditions:
                type: array
                items:
                  type: object
                  required: [lastTransitionTime, reason, status, type]
                  properties:
                    status: { type: string }
                    type: { type: string }
                    reason: { type: string }
                    message: { type: string }
                    lastTransitionTime: { type: string, format: date-time }

  - name: v1-1-8
    served: true
    storage: false
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              app: { type: object }

  - name: v1-1-7
    served: true
    storage: false
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              app: { type: object }